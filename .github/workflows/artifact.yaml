name: Exemplo Artifact
run-name: Exemplo workflow artifact, executado por ${{github.actor}}
on:
  workflow_dispatch:  
  
env:
    nome-artefato: teste-artefato

jobs:
    upload-artifact:
        runs-on: ubuntu-latest
        steps:
            - name: Listagem de Arquivos
              run: ls

            - name: Gerar alguns arquivos
              run: |
                mkdir artefatos
                echo "Arquivo de teste 01" > ./artefatos/arquivo1.txt
                echo "Arquivo de teste 02" > ./artefatos/arquivo2.txt
                echo "Arquivo de teste 03" > ./artefatos/arquivo3.txt
                echo "Arquivo de teste 04" > ./artefatos/arquivo4.txt

            - name: Envio dos arquivos
              uses: actions/upload-artifact@v4
              id: upload-artifact
              with: 
                name: ${{env.nome-artefato}}
                path: ./artefatos
                
            - name: Listagem de arquivos
              run: ls
            
            - name: Endereço para obter artefatos
              run: |
                echo "${{steps.upload-artifact.outputs.artifact-url}}"

    download-artifact:
        runs-on: ubuntu-latest
        needs: [upload-artifact]
        steps:
            - name: Listagem de arquivos
              run: ls

            - name: Download artifacts
              uses: actions/download-artifact@v8
              with:
                name:  ${{env.nome-artefato}}

            - name: Listagem de arquivos
              run: ls
    