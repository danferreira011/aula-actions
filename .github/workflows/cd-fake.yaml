name: CD Fake
on:
    workflow_dispatch:
        # inputs:
        #     ambiente:
        #         type: choice
        #         options:
        #             - homologacao
        #             - producao
jobs:
    deploy-fake-homolog:
        runs-on: ubuntu-latest
        environment: # homologacao #{{inputs.ambiente}}
            name: homologacao
            url: https://www.danferreira.tec.br/
        steps:
            - name: Fake deploy no ambiente
              run: echo "Deploy no ambiente de ${{vars.AMBIENTE_DEPLOY}}"

    teste-fake:
        runs-on: ubuntu-latest
        environment: #homologacao
            name: homologacao
            url: https://www.danferreira.tec.br/
        needs: [deploy-fake-homolog]
        steps:
            - name: Teste fake teste no ambiente
              run: echo "Teste no ambiente de ${{vars.AMBIENTE_DEPLOY}}"

    deploy-fake-producao:
        runs-on: ubuntu-latest
        environment: #producao
            name: producao
            url: https://www.danferreira.tec.br/
        needs: [teste-fake]
        steps:
            - name: Deploy fake deploy no ambiente
              run: echo "Deploy no ambiente de ${{vars.AMBIENTE_DEPLOY}}"