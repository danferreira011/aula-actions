name: Workflow Concorrencia Job #concorrencia a nível de job
run-name: Workflow Concorrencia ${{github.run_number}}
on:
    workflow_dispatch:
        inputs: #input para o teste 2
            chave:
                type: string
                default: pipeline-aula
jobs:
    fluxo-01:
        runs-on: ubuntu-latest
        # concurrency: <dolar>{{inputs.chave}} #teste de concorrencia 1
        concurrency:
            group:  ${{inputs.chave}}
            cancel-in-progress: true
        steps:
            - name: Job teste
              run: |
                sleep 120;
                echo "Action exec Job 1"
  
    fluxo-02:
        runs-on: ubuntu-latest
        needs: [fluxo-01] #dependencia
        steps:
            - name: Job teste 2
              run: |
                sleep 120;
                echo "Action exec Job 2"