name: Deploy Fake com Imput
on:
    workflow_call:
        inputs:
            ambiente:
                type: string
                default: "desenvolvimento"
                required: true
                description: "Ambiente do deploy"
jobs:
    deploy-to-k8s:
        runs-on: ubuntu-latest  
        steps:
            - name: Deploy no ambiente
              run: echo "Executando o deploy no ambiente de ${{inputs.ambiente}}"