name: Evento Fuctions
on:
    workflow_dispatch:  
        inputs:
            valor-numerico:
                type: number
                default: 20

            valor-string:
                type: string
                default: "XPTO"

            valor-boolean:
                type: boolean
                default: true
                
jobs:
    teste:
        permissions: write-all
        runs-on: ubuntu-latest
        steps:

            - name: Função Contains
              run: echo "${{ contains(inputs.valor-string, github.actor) }}"

            - name: Função Format
              run: "echo ${{ format('Formato String: {0} - Formato Numer: {1} - Formato Boolean: {2}', inputs.valor-string, inputs.valor-numerico, inputs.valor-boolean) }}"

            - name: Função Json
              run: echo "${{toJson(github)}}"