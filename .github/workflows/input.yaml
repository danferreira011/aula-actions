name: Exemplo Input
run-name: Exemplo workflow input, executado por ${{github.actor}}
on:
  workflow_dispach:
    inputs:
      versao:
        type: string
        required: true
        default: "dev"
        description: "Versão da Release"
      numero_card:
        type: number
        required: true
        description: "Níumero do card da tarefa do commit"
      fazer_deploy:
        type: boolean
        required: true
        description:"Especifica se deve ou não fazer deploy"
      ambiente: 
        type: choice
        required: true
        description: "Ambiente do deploy"
        options:
          - Desenvolvimento
          - Homologacao
          - Produção
jobs:
  valores_input:
    runs-on: ubuntu-latest
    steps:
      - name Exibindo o context de input completo
        run: echo "${{toJson(inputs)}}"
      - name: Exibindo valores individualmente
        run: |
          echo "Valores passados nos inputs"
          echo "A Versão é: ${{inputs.versao}}"
          echo "O card é: ${{inputs.numero_card}}"
          echo "Faz deploy ?: ${{inputs.fazer_deploy}}"
          echo "O ambiente é: ${{inputs.ambiente}}"
          