name: Workflow Status Steps
on:
    push:
jobs: 
    apenas-main:
        if: ${{ github.ref == 'refs/heads/main'}}
        name: Essejob só executa na branch main
        runs-on: ubuntu-latest
        steps:
            - name: Executando na main
              run: echo "Executado na main"
    todos:
        runs-on: ubuntu-latest
        steps:
            - name: Execução em Featutre
              if: ${{contains(github.ref, 'refs/heads/feature')}}
              run: echo "Execução en Feature"
              
            - name: Execução em Hotfix
              if: ${{contains(github.ref, 'refs/heads/hotfix')}}
              run: echo "Execução en Hotfix"

            - name: Execução em Main
              if: ${{github.ref == 'refs/heads/main'}}
              run: echo "Execução en Main"

            - name: Execução em Todos              
              run: ech "Execução en Todos"

            - name: Envio de Status de Erro 
              if: ${{failure()}}            
              run: echo "Status > Erro Number > 402"