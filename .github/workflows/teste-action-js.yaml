name: "Teste de Action"
on:
    issues:
        types: [opened]
    pull_request:
        types: [opened]
jobs:
    action-job:
        permissions:
            issues: write
            pull-requests: write
        runs-on: ubuntu-latest
        name: Execução de Custom Action
        steps:
            - name: Adicionando Comentário
              id: comment_step
              uses: danferreira011/action-js@main   # owner/action@versão
              with:
                GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
                issue-id: ${{github.event.issue.number}}
                comment: "Teste de Comentário"

            - name: Mostrar ID Comment
              run: |
                echo "ID do comentário é: ${{steps.comment_step.outputs.comment-id}}"